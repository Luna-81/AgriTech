# .github/workflows/ci.yml
name: CI Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run Unit Tests
      run: |
        dotnet test --configuration Release --filter "Category=Unit" --results-directory ./TestResults
    
    - name: Run Integration Tests
      run: |
        dotnet test --configuration Release \
          --filter "Category=Integration" \
          --no-build \
          --results-directory ./TestResults
      env:
        TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=testdb;Username=postgres;Password=postgres;"

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool
    
    - name: Generate Coverage Report
      run: |
        dotnet test --configuration Release --filter "Category=Unit" --collect:"XPlat Code Coverage" --results-directory ./TestResults
        reportgenerator -reports:"./TestResults/**/coverage.cobertura.xml" -targetdir:"./CoverageReport" -reporttypes:"HtmlInline_AzurePipelines"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./CoverageReport
    
    - name: Check Coverage Threshold
      run: |
        COVERAGE=$(dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Exclude='[xunit.*]*,[*.Tests]*' 2>&1 | grep -oP '\d+\.\d+' | head -1)
        echo "Coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
          echo "❌ Coverage $COVERAGE% is below 80% threshold!"
          exit 1
        else
          echo "✅ Coverage $COVERAGE% meets 80% threshold!"
        fi
    
    - name: Publish Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./TestResults
    
  push-to-acr:
    name: 🐳 Push to ACR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔑 Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    
    - name: 🐳 Build and push WebAPI
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/WebAPI/Dockerfile
        push: true
        tags: |
          ${{ secrets.AZURE_CONTAINER_REGISTRY }}/webapi:latest
          ${{ secrets.AZURE_CONTAINER_REGISTRY }}/webapi:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: 🐳 Build and push Worker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/AgriTech.Worker/Dockerfile
        push: true
        tags: |
          ${{ secrets.AZURE_CONTAINER_REGISTRY }}/worker:latest
          ${{ secrets.AZURE_CONTAINER_REGISTRY }}/worker:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

